<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waterborne Disease Risk Prediction</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-lg shadow-lg w-full max-w-md">
        <h1 class="text-2xl font-bold text-center mb-6">Waterborne Disease Risk Prediction</h1>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="bg-red-100 border-l-4 border-red-500 text-red-700 p-4 mb-4" role="alert">
                    {% for message in messages %}
                        <p>{{ message }}</p>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}

        <!-- Prediction Form -->
        <h2 class="text-lg font-semibold mb-4">Predict Risk</h2>
        <form action="{{ url_for('predict') }}" method="POST" class="space-y-4">
            <div>
                <label for="state" class="block text-sm font-medium text-gray-700">State</label>
                <select name="state" id="state" class="mt-1 block w-full p-2 border border-gray-300 rounded-md" required>
                    <option value="" disabled selected>Select a state</option>
                    {% for state in states %}
                        <option value="{{ state }}">{{ state }}</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label for="month" class="block text-sm font-medium text-gray-700">Month</label>
                <select name="month" id="month" class="mt-1 block w-full p-2 border border-gray-300 rounded-md" required>
                    <option value="" disabled selected>Select a month</option>
                    {% for month in months %}
                        <option value="{{ month }}">{{ month }}</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label for="year" class="block text-sm font-medium text-gray-700">Year</label>
                <input type="number" name="year" id="year" class="mt-1 block w-full p-2 border border-gray-300 rounded-md" required placeholder="e.g., 2023">
            </div>
            <button type="submit" class="w-full bg-blue-600 text-white p-2 rounded-md hover:bg-blue-700">Predict</button>
        </form>

        <!-- Subscription Form - Coming Soon -->
        <div class="mt-8 p-4 bg-gray-50 rounded-md border border-gray-200">
            <h2 class="text-lg font-semibold mb-2">Email Alert Subscription</h2>
            <p class="text-sm text-gray-600">Email alert functionality coming soon! Stay tuned for updates.</p>
        </div>
    </div>
</body>
</html>
